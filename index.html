<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plus კონვერტორი</title>
<style>
  :root{
    --red-deep:#8f1210;
    --red-main:#c41e1e;
    --red-bright:#e2231a;
    --orange:#ff7a1a;
    --orange-light:#ffb27a;
    --cream:#fff4ea;
    --ink:#2b0e0a;
    --white:#ffffff;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(255,122,26,0.35), transparent 60%),
      radial-gradient(900px 500px at 100% 10%, rgba(255,60,30,0.25), transparent 55%),
      linear-gradient(160deg, var(--red-deep) 0%, var(--red-main) 45%, var(--red-bright) 100%);
    min-height:100vh;
    font-family: 'Segoe UI', 'BPG Nino Mtavruli', 'Noto Sans Georgian', Arial, sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:0 0 60px 0;
  }
  .page{
    width:100%;
    max-width:560px;
    padding:0 18px;
  }
  .hero{
    margin:0 -18px 0 -18px;
    overflow:hidden;
    position:relative;
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
  }
  .hero img{
    width:100%;
    display:block;
  }
  .hero::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:70px;
    background:linear-gradient(to top, rgba(143,18,16,0.85), rgba(143,18,16,0));
  }

  /* Promo text box - sits between hero photo and the converter card */
  .promo-box{
    position:relative;
    margin:22px 0 18px 0;
    background:#ffffff;
    border:3px solid #1a1a1a;
    border-radius:16px;
    padding:16px 56px 16px 18px;
    box-shadow:0 14px 30px rgba(0,0,0,0.35);
  }
  .promo-box p{
    margin:0;
    color:#c41e1e;
    font-weight:800;
    font-size:0.95rem;
    line-height:1.5;
  }
  .promo-box .sticker{
    position:absolute;
    top:-16px;
    right:-10px;
  }

  .card-shell{
    background:linear-gradient(180deg, #fff8f1 0%, #ffffff 100%);
    border-radius:22px;
    margin-top:0;
    position:relative;
    z-index:2;
    padding:22px 18px 26px 18px;
    box-shadow:0 20px 45px rgba(60,5,5,0.4);
  }

  .tabs{
    display:flex;
    gap:8px;
    background:#f4e3d8;
    border-radius:16px;
    padding:6px;
    margin-bottom:28px;
  }
  .tab-btn{
    flex:1;
    border:none;
    background:transparent;
    padding:12px 8px;
    font-size:0.78rem;
    font-weight:800;
    line-height:1.3;
    border-radius:12px;
    cursor:pointer;
    color:#5c2818;
    transition:all .25s ease;
    font-family:inherit;
    letter-spacing:0.1px;
  }
  .tab-btn.active{
    background:linear-gradient(135deg, var(--red-deep), #4a0908);
    color:#fff;
    box-shadow:0 6px 16px rgba(74,9,8,0.45);
  }

  .panel{display:none;}
  .panel.active{display:block; animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  h2.section-title{
    text-align:center;
    font-size:1.05rem;
    font-weight:800;
    margin:0 0 18px 0;
    color:var(--red-deep);
    letter-spacing:0.2px;
    line-height:1.35;
  }

  /* sub tab toggle buttons inside Plus points panel */
  .sub-toggle{
    display:flex;
    gap:10px;
    margin-top:6px;
    margin-bottom:22px;
  }
  .sub-btn{
    flex:1;
    padding:14px 8px;
    border-radius:14px;
    border:2px solid var(--orange);
    background:#fff;
    color:var(--red-deep);
    font-weight:700;
    font-size:0.92rem;
    cursor:pointer;
    font-family:inherit;
    transition:all .2s ease;
  }
  .sub-btn.active{
    background:linear-gradient(135deg, var(--orange), var(--red-bright));
    color:#fff;
    border-color:transparent;
    box-shadow:0 8px 18px rgba(226,35,26,0.3);
  }

  .converter-row{
    display:flex;
    align-items:flex-end;
    gap:10px;
  }
  .field{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .field label{
    font-size:0.85rem;
    font-weight:700;
    color:#8a3d2c;
    text-align:center;
  }
  .field input{
    width:100%;
    padding:14px 10px;
    border-radius:14px;
    border:2px solid #f0d3c2;
    background:#fffaf5;
    font-size:1.05rem;
    font-weight:700;
    text-align:center;
    color:var(--ink);
    font-family:inherit;
    outline:none;
    transition:border-color .2s ease;
  }
  .field input:focus{
    border-color:var(--orange);
    background:#fff;
  }
  .field input[readonly]{
    background:linear-gradient(135deg,#fff1e6,#ffe4d1);
    color:var(--red-deep);
    border-color:var(--orange-light);
  }
  .equals{
    font-size:1.6rem;
    font-weight:800;
    color:var(--orange);
    padding-bottom:14px;
    user-select:none;
  }

  .sub-panel{display:none;}
  .sub-panel.active{display:block;}

  /* Tab 2 layout */
  .stack-field{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:16px;
  }
  .stack-field.spaced{
    margin-top:26px;
  }
  .stack-field label{
    font-size:0.9rem;
    font-weight:700;
    color:#8a3d2c;
  }
  .stack-field input{
    padding:14px 14px;
    border-radius:14px;
    border:2px solid #f0d3c2;
    background:#fffaf5;
    font-size:1.05rem;
    font-weight:700;
    color:var(--ink);
    font-family:inherit;
    outline:none;
    transition:border-color .2s ease;
  }
  .stack-field input:focus{
    border-color:var(--orange);
    background:#fff;
  }
  .stack-field input[readonly]{
    background:linear-gradient(135deg,#fff1e6,#ffe4d1);
    color:var(--red-deep);
    border-color:var(--orange-light);
    font-size:1.15rem;
  }

  .sticker{
    position:absolute;
    top:-14px;
    right:-8px;
    background:radial-gradient(circle at 30% 30%, #ffd23d, #ff9a1f 70%);
    color:#7a1a00;
    font-weight:900;
    font-size:1rem;
    width:58px;
    height:58px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    transform:rotate(12deg);
    box-shadow:0 8px 16px rgba(0,0,0,0.35), 0 0 0 3px rgba(255,255,255,0.5) inset;
    border:2px solid #fff;
  }

  .mr-note{
    margin-top:18px;
    color:#8a4a37;
    font-size:0.85rem;
    line-height:1.5;
    text-align:center;
    opacity:0.9;
  }

  @media (max-width:380px){
    .field label{font-size:0.75rem;}
    .field input{font-size:0.9rem; padding:12px 6px;}
  }
</style>
</head>

  // ---- Sub tab switching (tab1) ----
  document.querySelectorAll('.sub-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.sub-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.sub).classList.add('active');
    });
  });

  // ---- Helpers ----
  function parseNum(str){
    if(str===undefined || str===null) return 0;
    let s = str.toString().trim();
    // keep only digits, commas, dots, minus
    s = s.replace(/[^0-9.,\-]/g,'');
    if(s === '') return 0;
    const lastComma = s.lastIndexOf(',');
    const lastDot = s.lastIndexOf('.');
    if(lastComma > -1 && lastDot > -1){
      if(lastComma > lastDot){
        // comma is the decimal separator, dots are thousands separators
        s = s.replace(/\./g,'').replace(',', '.');
      } else {
        // dot is the decimal separator, commas are thousands separators
        s = s.replace(/,/g,'');
      }
    } else if(lastComma > -1){
      // only a comma present -> treat it as the decimal separator
      s = s.replace(',', '.');
    }
    const num = parseFloat(s);
    return isNaN(num) ? 0 : num;
  }
  function formatWithSuffix(num, suffix){
    const formatted = num.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    return formatted + ' ' + suffix;
  }
  function formatPlain(num){
    return num.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  // Generic input wiring: field clears itself on focus, formatted display on blur
  function wireInput(inputEl, suffix, onChange){
    inputEl.addEventListener('focus', ()=>{
      inputEl.value = '';
      onChange(0);
    });
    inputEl.addEventListener('input', ()=>{
      onChange(parseNum(inputEl.value));
    });
    inputEl.addEventListener('blur', ()=>{
      const raw = parseNum(inputEl.value);
      inputEl.value = formatWithSuffix(raw, suffix);
      onChange(raw);
    });
  }

  // ---- Sub panel 1: Plus points -> GEL ----
  const p2gInput = document.getElementById('p2g_input');
  const p2gOutput = document.getElementById('p2g_output');
  wireInput(p2gInput, 'ქულა', (val)=>{
    p2gOutput.value = formatWithSuffix(val/200, '₾');
  });

  // ---- Sub panel 2: GEL -> Plus points ----
  const g2pInput = document.getElementById('g2p_input');
  const g2pOutput = document.getElementById('g2p_output');
  wireInput(g2pInput, '₾', (val)=>{
    g2pOutput.value = formatWithSuffix(val*200, 'ქულა');
  });

  // ---- Tab 2: Plus X Cash X Card ----
  const orderValueInput = document.getElementById('order_value');
  const orderPointsInput = document.getElementById('order_points');
  const orderRemaining = document.getElementById('order_remaining');

  function recalcOrder(){
    const orderVal = parseNum(orderValueInput.value);
    const pointsVal = parseNum(orderPointsInput.value);
    const remaining = orderVal - (pointsVal/200);
    orderRemaining.value = formatWithSuffix(remaining, '₾');
  }

  wireInput(orderValueInput, '₾', ()=>{ recalcOrder(); });
  wireInput(orderPointsInput, 'ქულა', ()=>{ recalcOrder(); });

</script>
